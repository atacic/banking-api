spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.continue-on-error=true

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml

#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql=TRACE

application.secret=MySuperSecretKeyForHS512ThatIsAtLeast64BytesLongForTests!1234567890

rate-limiter.max.attempts=3
rate-limiter.time.window.size.ms=60000
rate-limiter.cleanup.interval.ms=300000

logging.level.com.aleksa.banking_api=INFO
