spring.application.name=banking-api

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/v3/api-docs

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.url=jdbc:postgresql://localhost:5432/banking_api_db
spring.datasource.username=postgres-user
spring.datasource.password=postgres-password

spring.sql.init.continue-on-error=true

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

application.secret=${APPLICATION_SECRET}

rate-limiter.max.attempts=5
rate-limiter.time.window.size.ms=60000
rate-limiter.cleanup.interval.ms=300000

# Normal production level (shows important events, successes, failures)
logging.level.com.aleksa.banking_api=INFO

# Very detailed (recommended for local development & troubleshooting)
#logging.level.com.aleksa.banking_api=DEBUG

# Quiet - only potential problems and errors
#logging.level.com.aleksa.banking_api=WARN

# Very quiet - only real errors and exceptions
#logging.level.com.aleksa.banking_api=ERROR

# Almost nothing - only fatal-level issues (rarely used)
#logging.level.com.aleksa.banking_api=FATAL

# Maximum detail (extremely verbose - includes everything below)
#logging.level.com.aleksa.banking_api=TRACE

# Completely silent for this package - no logs at all
#logging.level.com.aleksa.banking_api=OFF
